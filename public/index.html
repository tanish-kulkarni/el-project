<!DOCTYPE html>
<html>
<head>
  <title>Venatrix Login</title>
  <link rel="icon" type="image/png" sizes="32x32" href="login.png">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="center">

<!-- TOAST -->
<div id="toast" style="
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(15,23,42,0.95);
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  display: none;
  z-index: 999;
  font-size: 14px;
"></div>

<div class="glass-card">

  <!-- BRAND -->
  <div class="brand" style="justify-content:center; margin-bottom:25px;">
    <img src="spider.png" class="logo">
    <div class="brand-text">
      <h2>VENATRIX</h2>
      <span class="tagline">Secure • Intelligent • Autonomous</span>
    </div>
  </div>


  /new
  <!-- ===================== -->
  <!-- STEP 1: LOGIN / SIGNUP -->
  <!-- ===================== -->
  <div id="authSection">
              //new



    <!-- MODE SWITCH -->
    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px; font-size:14px;">
      <span id="loginTab" onclick="switchMode('login')" style="cursor:pointer; font-weight:600;">Login</span>
      <span id="signupTab" onclick="switchMode('signup')" style="cursor:pointer; color:#94a3b8;">Sign Up</span>
    </div>

    <!-- INPUTS -->
    <select id="institute" class="input-field">
      <option value="" disabled selected>Select Institute</option>
      <option value="RVCE">RVCE</option>
    </select>

    <input id="user" class="input-field" placeholder="Username">
    <input id="pass" type="password" class="input-field" placeholder="Password">
    <input id="email" class="input-field" placeholder="Institute Email (rvce.edu.in)" style="display:none;">

    <button id="mainBtn" onclick="login()">Login</button>

  </div>





  
  <!-- ========================= -->   //new
  <!-- STEP 2: OTP (signup only) -->
  <!-- ========================= -->
  <div id="otpSection" style="display:none;">

    <div style="text-align:center; margin-bottom:20px;">
      <p style="color:#94a3b8; font-size:14px; margin:0 0 6px;">OTP sent to your institute email</p>
      <p style="color:#64748b; font-size:12px; margin:0;">Check your inbox — expires in 5 minutes</p>
    </div>

    <input
      id="otpInput"
      class="input-field"
      placeholder="Enter 6-digit OTP"
      maxlength="6"
      style="text-align:center; font-size:1.4rem; letter-spacing:0.4rem;"
    >

    <button onclick="verifyOTP()">Verify & Sign Up</button>

    <div style="text-align:center; margin-top:12px;">
      <span onclick="backToAuth()" style="color:#94a3b8; font-size:13px; cursor:pointer; text-decoration:underline;">← Back</span>
    </div>

  </div>
                             //new





</div>

<script>

let mode = "login";



let pendingEmail = null; // set after /signup-request succeeds
//new



/* ===== TOAST ===== */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 2500);
}

/* ===== SWITCH MODE ===== */
function switchMode(newMode) {
  mode = newMode;

  const emailField = document.getElementById("email");
  const mainBtn    = document.getElementById("mainBtn");
  const loginTab   = document.getElementById("loginTab");
  const signupTab  = document.getElementById("signupTab");

  if (mode === "signup") {
    emailField.style.display = "block";
    
    
    
    mainBtn.innerText = "Send OTP";           //new



    mainBtn.onclick = signup;
    loginTab.style.color = "#94a3b8"; loginTab.style.fontWeight = "400";
    signupTab.style.color = "white";  signupTab.style.fontWeight = "600";
  } else {
    emailField.style.display = "none";
    mainBtn.innerText = "Login";
    mainBtn.onclick = login;
    signupTab.style.color = "#94a3b8"; signupTab.style.fontWeight = "400";
    loginTab.style.color = "white";    loginTab.style.fontWeight = "600";
  }
}

/* ===== ENTER KEY ===== */
document.getElementById("pass").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    if (mode === "login") login();
    else signup();
  }
});

/* ===== LOGIN — password only, straight to dashboard ===== */
async function login() {
  const username  = document.getElementById("user").value;
  const password  = document.getElementById("pass").value;
  const institute = document.getElementById("institute").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password, institute })
  });

  if (res.ok) {
    const data = await res.json();

    
    
    
    //new
    // Decode JWT payload to get user info
    const payload = JSON.parse(atob(data.token.split(".")[1]));
    sessionStorage.setItem("token", data.token);
    sessionStorage.setItem("user", JSON.stringify({
      username: payload.username,
      role: payload.role,
      institute: payload.institute
    }));    //new





    window.location = "dashboard.html";
  } else {
    const msg = await res.text();
    showToast(msg);
  }
}





/* ===== SIGNUP — STEP 1: send OTP ===== */       //new
async function signup() {
  const username  = document.getElementById("user").value;
  const password  = document.getElementById("pass").value;
  const email     = document.getElementById("email").value;
  const institute = document.getElementById("institute").value;

  if (!username || !password || !email || !institute) {
    showToast("Fill all fields");
    return;
  }

  const res = await fetch("/signup-request", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password, email, institute })
  });

  if (!res.ok) {
    const msg = await res.text();
    showToast(msg);
    return;
  }

  // OTP sent — show OTP screen
  pendingEmail = email;
  document.getElementById("authSection").style.display = "none";
  document.getElementById("otpSection").style.display  = "block";
  showToast("OTP sent! Check your email.");
}                      //new







/* ===== SIGNUP — STEP 2: verify OTP ===== */                  //new
async function verifyOTP() {
  const otp = document.getElementById("otpInput").value.trim();

  if (!otp || otp.length !== 6) {
    showToast("Enter the 6-digit OTP");
    return;
  }

  if (!pendingEmail) {
    showToast("Session lost. Please sign up again.");
    backToAuth();
    return;
  }

  const res = await fetch("/verify-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: pendingEmail, otp })
  });

  if (!res.ok) {
    const msg = await res.text();
    showToast(msg);
    return;
  }

  // Account created — go back to login
  pendingEmail = null;
  document.getElementById("otpInput").value = "";
  document.getElementById("otpSection").style.display  = "none";
  document.getElementById("authSection").style.display = "block";
  switchMode("login");
  showToast("Signup submitted! Await admin approval.");
}                                   //new




/* ===== BACK ===== */    //new
function backToAuth() {
  pendingEmail = null;
  document.getElementById("otpInput").value = "";
  document.getElementById("otpSection").style.display  = "none";
  document.getElementById("authSection").style.display = "block";
}                          //new




</script>

</body>
</html>
